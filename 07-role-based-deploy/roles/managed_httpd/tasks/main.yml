---
- name: Install web packages
  ansible.builtin.dnf:
    name: "{{ managed_httpd_packages }}"
    state: present

- name: Ensure firewalld is running
  ansible.builtin.systemd_service:
    name: firewalld
    enabled: true
    state: started

- name: Ensure the role managed document root exists
  ansible.builtin.file:
    path: "{{ managed_httpd_docroot }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy the role managed virtual host
  ansible.builtin.template:
    src: site.conf.j2
    dest: /etc/httpd/conf.d/role-site.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart httpd

- name: Deploy the role managed index
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ managed_httpd_docroot }}/index.html"
    owner: root
    group: root
    mode: "0644"

- name: Validate the full httpd configuration
  ansible.builtin.command: /usr/sbin/httpd -t
  register: role_httpd_validation
  changed_when: false
  failed_when: role_httpd_validation.rc != 0

- name: Ensure the web service is enabled and running
  ansible.builtin.systemd_service:
    name: "{{ managed_httpd_service_name }}"
    enabled: true
    state: started

- name: Open the firewall service
  ansible.posix.firewalld:
    service: "{{ managed_httpd_firewall_service }}"
    permanent: true
    immediate: true
    state: enabled

- name: Show a short role deployment summary
  ansible.builtin.debug:
    msg:
      - "Validated httpd configuration on {{ inventory_hostname }}"
      - "Document root: {{ managed_httpd_docroot }}"
      - "Firewall service opened: {{ managed_httpd_firewall_service }}"
