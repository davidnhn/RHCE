[defaults]
# Toujours fixer explicitement l'inventaire pour eviter les erreurs de chemin.
inventory = inventory.yml

# Dans un lab, host_key_checking = False fait gagner du temps.
host_key_checking = False

# Bonne pratique dans les labs de formation.
retry_files_enabled = False
interpreter_python = auto_silent
remote_user = student

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
